<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A lightweight PWA for tracking daily habits" />
  <meta name="theme-color" content="#45b7d1" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Habit Tracker" />
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="/habit-tracker/manifest.json" />
  
  <!-- Icons -->
  <link rel="icon" type="image/svg+xml" href="/habit-tracker/favicon.svg?v=2" />
  <link rel="apple-touch-icon" href="/habit-tracker/favicon.svg?v=2" />
  <link rel="shortcut icon" href="/habit-tracker/favicon.svg?v=2" />
  
  <title>Habit Tracker ☑️</title>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.jsx"></script>
  
  <!-- Service Worker Registration with cache bust -->
  <script>
    if ('serviceWorker' in navigator) {
      // Unregister old workers first
      navigator.serviceWorker.getRegistrations().then((registrations) => {
        for (let registration of registrations) {
          registration.unregister();
        }
      });
      
      // Register new one
      setTimeout(() => {
        navigator.serviceWorker.register('/habit-tracker/sw.js?v=3').catch(err => {
          console.log('Service Worker registration failed:', err);
        });
      }, 100);
    }
  </script>
</body>
</html>
