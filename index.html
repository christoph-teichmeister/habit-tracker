<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A lightweight PWA for tracking daily habits" />
  <meta name="theme-color" content="#45b7d1" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Habit Tracker" />
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="/habit-tracker/manifest.json" />
  
  <!-- Icons -->
  <link rel="icon" type="image/svg+xml" href="/habit-tracker/favicon.svg" />
  <link rel="apple-touch-icon" href="/habit-tracker/favicon.svg" />
  <link rel="shortcut icon" href="/habit-tracker/favicon.svg" />
  
  <title>Habit Tracker 🪐</title>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.jsx"></script>
  
  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/habit-tracker/sw.js').catch(err => {
        console.log('Service Worker registration failed:', err);
      });
    }
  </script>
</body>
</html>
