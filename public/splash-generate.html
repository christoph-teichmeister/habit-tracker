<!DOCTYPE html>
<html>
<head>
  <title>Generate Splash Screens</title>
</head>
<body style="margin: 0; padding: 20px; background: #f5f5f5; font-family: Arial;">
  <h1>Splash Screen Generator</h1>
  <p>Right-click each image and "Save image as..."</p>
  
  <h2>540x720 (Portrait Mobile)</h2>
  <canvas id="splash540"></canvas>
  
  <h2>1440x1440 (Tablet)</h2>
  <canvas id="splash1440"></canvas>
  
  <script>
    // Generate 540x720 splash
    const canvas1 = document.getElementById('splash540');
    canvas1.width = 540;
    canvas1.height = 720;
    const ctx1 = canvas1.getContext('2d');
    
    // Gradient background
    const grad1 = ctx1.createLinearGradient(0, 0, 0, 720);
    grad1.addColorStop(0, '#45b7d1');
    grad1.addColorStop(1, '#357abd');
    ctx1.fillStyle = grad1;
    ctx1.fillRect(0, 0, 540, 720);
    
    // Circle background
    ctx1.fillStyle = 'rgba(255, 255, 255, 0.1)';
    ctx1.beginPath();
    ctx1.arc(270, 250, 200, 0, Math.PI * 2);
    ctx1.fill();
    
    // Checkbox icon (bigger)
    ctx1.strokeStyle = 'white';
    ctx1.lineWidth = 12;
    ctx1.lineCap = 'round';
    ctx1.lineJoin = 'round';
    
    // Draw checkbox
    ctx1.strokeRect(120, 140, 300, 300);
    
    // Draw checkmark
    ctx1.beginPath();
    ctx1.moveTo(180, 300);
    ctx1.lineTo(260, 380);
    ctx1.lineTo(420, 200);
    ctx1.stroke();
    
    // Text
    ctx1.fillStyle = 'white';
    ctx1.font = 'bold 48px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
    ctx1.textAlign = 'center';
    ctx1.fillText('Habit Tracker', 270, 520);
    
    ctx1.font = '24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
    ctx1.fillStyle = 'rgba(255, 255, 255, 0.9)';
    ctx1.fillText('Build better habits', 270, 560);
    
    // Download link
    const link1 = document.createElement('a');
    link1.href = canvas1.toDataURL('image/png');
    link1.download = 'splash-540x720.png';
    const p1 = document.createElement('p');
    p1.appendChild(link1);
    link1.textContent = '↓ Download 540x720';
    link1.style.display = 'inline-block';
    link1.style.padding = '10px 20px';
    link1.style.background = '#45b7d1';
    link1.style.color = 'white';
    link1.style.textDecoration = 'none';
    link1.style.borderRadius = '6px';
    link1.style.marginTop = '10px';
    canvas1.parentNode.insertBefore(p1, canvas1.nextSibling);
    
    // Generate 1440x1440 splash
    const canvas2 = document.getElementById('splash1440');
    canvas2.width = 1440;
    canvas2.height = 1440;
    const ctx2 = canvas2.getContext('2d');
    
    // Gradient background
    const grad2 = ctx2.createLinearGradient(0, 0, 0, 1440);
    grad2.addColorStop(0, '#45b7d1');
    grad2.addColorStop(1, '#357abd');
    ctx2.fillStyle = grad2;
    ctx2.fillRect(0, 0, 1440, 1440);
    
    // Circle background
    ctx2.fillStyle = 'rgba(255, 255, 255, 0.1)';
    ctx2.beginPath();
    ctx2.arc(720, 400, 400, 0, Math.PI * 2);
    ctx2.fill();
    
    // Checkbox icon (bigger)
    ctx2.strokeStyle = 'white';
    ctx2.lineWidth = 30;
    ctx2.lineCap = 'round';
    ctx2.lineJoin = 'round';
    
    // Draw checkbox
    ctx2.strokeRect(270, 240, 900, 900);
    
    // Draw checkmark
    ctx2.beginPath();
    ctx2.moveTo(370, 700);
    ctx2.lineTo(550, 880);
    ctx2.lineTo(1070, 360);
    ctx2.stroke();
    
    // Text
    ctx2.fillStyle = 'white';
    ctx2.font = 'bold 120px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
    ctx2.textAlign = 'center';
    ctx2.fillText('Habit Tracker', 720, 1250);
    
    ctx2.font = '60px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
    ctx2.fillStyle = 'rgba(255, 255, 255, 0.9)';
    ctx2.fillText('Build better habits', 720, 1340);
    
    // Download link
    const link2 = document.createElement('a');
    link2.href = canvas2.toDataURL('image/png');
    link2.download = 'splash-1440x1440.png';
    const p2 = document.createElement('p');
    p2.appendChild(link2);
    link2.textContent = '↓ Download 1440x1440';
    link2.style.display = 'inline-block';
    link2.style.padding = '10px 20px';
    link2.style.background = '#45b7d1';
    link2.style.color = 'white';
    link2.style.textDecoration = 'none';
    link2.style.borderRadius = '6px';
    link2.style.marginTop = '10px';
    canvas2.parentNode.insertBefore(p2, canvas2.nextSibling);
  </script>
  
  <style>
    canvas {
      border: 1px solid #ddd;
      margin: 20px 0;
      max-width: 100%;
      height: auto;
    }
  </style>
</body>
</html>
